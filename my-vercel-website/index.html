<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vercel Database App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Contact Us</h1>
            <p>Leave a message and it will be saved to our Vercel Postgres database!</p>
        </header>

        <main>
            <section class="form-section">
                <form id="submission-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="Your email">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required placeholder="Your message..."></textarea>
                    </div>
                    <button type="submit" id="submit-btn">Submit</button>
                    <div id="form-status" class="status-message"></div>
                </form>
            </section>

            <section class="data-section">
                <h2>Recent Submissions</h2>
                <div id="submissions-list" class="submissions-grid">
                    <p class="loading">Loading submissions...</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
